name: Pull Request Check

env:
  GITHUB_BUILD_NUMBER: ${{ github.run_number }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  test:
    name: Package Schema Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate changed package JSON files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -t files < <(git diff --name-only "$BASE_SHA...HEAD" -- 'packages/**/*.json')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed package JSON files to validate."
            exit 0
          fi

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              bun scripts/validate-package.ts "$file" --schema-only
            fi
          done
